<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔔 도전! 독서 골든벨 🔔</title>
    <style>
        /* 1. 화면 세로 크기를 100vh로 고정하여 스크롤 차단 */
body { 
    margin: 0; padding: 0; height: 100vh; overflow: hidden;
    background: radial-gradient(circle, #ffeb3b 10%, #fbc02d 90%);
    display: flex; justify-content: center; align-items: center;
}

        /* 2. 대형 컨테이너 박스 (기존 비율 유지) */
.container { 
    width: 1200px; 
    height: 800px;
    background: rgba(255, 255, 255, 0.98); 
    padding: 30px 40px; /* vh/vw 대신 px 사용 */
    border-radius: 40px; 
    box-shadow: 0 25px 60px rgba(230, 124, 0, 0.3); 
    border: 8px solid #e65100; 
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    position: relative;
    transform-origin: center center; /* 정중앙 기준 확대/축소 */
}

        /* 3. 첫 화면 전용 스타일 (1.png 이미지로 전체 화면 꽉 채우기) */
        .intro-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
            border-radius: 30px; /* 대형 박스 안쪽 둥글기에 맞춤 */
        }

        /* 첫 화면 메인 이미지 (첫 화면 영역을 100% 꽉 채움) */
        .main-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 찌그러지지 않고 영역을 가득 채우도록 설정 */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* 작고 깔끔하게 다듬은 시작 버튼 (오른쪽 아래 배치) */
        .btn-start-next {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 28px;
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            background: linear-gradient(135deg, #ffca28, #ff8f00);
            border: 3px solid #ffffff;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #e65100, 0 8px 15px rgba(230, 81, 0, 0.3);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2; /* 이미지 위로 올라오도록 설정 */
        }
        .btn-start-next:hover {
            transform: translateY(1px);
            box-shadow: 0 4px 0 #e65100, 0 6px 12px rgba(230, 81, 0, 0.3);
        }
        .btn-start-next:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #e65100, 0 2px 5px rgba(230, 81, 0, 0.2);
        }

        /* 4. 퀴즈 플레이 화면 스타일 */
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-bottom: 3px dashed #ffe082;
            padding-bottom: 1.5vh;
            flex-shrink: 0;
        }
        .quiz-type { 
            display: inline-block; 
            padding: 1vh 3vw; 
            background: linear-gradient(135deg, #d32f2f, #b71c1c); 
            color: #ffffff; 
            font-weight: 900; 
            font-size: 1.8rem; 
            border-radius: 50px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            border: 3px solid #fff;
        }
        .top-nav { display: flex; gap: 15px; }
        .btn-mini {
            width: 60px; height: 60px; font-size: 1.8rem; border: 2px solid #fff;
            border-radius: 50%; color: white; cursor: pointer; display: flex;
            justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }
        .btn-mini:hover { transform: scale(1.1); }
        .btn-answer { background: linear-gradient(135deg, #ff9800, #e65100); }
        .btn-next { background: linear-gradient(135deg, #4caf50, #1b5e20); }

#quiz-view {
    display: flex; 
    flex-direction: column; 
    height: 100%; 
    width: 100%;
    padding-bottom: 20px; /* 맨 아래쪽 여유 공간 */
}

.question {
    font-size: 3.5rem; 
    margin: 20px 0; 
    flex-grow: 1; /* 질문 영역이 남는 공간을 차지하게 함 */
    display: flex;
    align-items: center; 
    justify-content: center;
    text-align: center;

    color: #1a2a6c;             /* 진한 남색 설정 */
    font-weight: 800;           /* 글씨를 아주 굵게 */
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* 약간의 그림자로 입체감 추가 */
}

.choices { 
    display: flex; 
    flex-direction: column; /* 세로 정렬 */
    gap: 10px;              /* 보기 사이 간격 */
    align-items: center; 
    width: 100%; 
    flex-shrink: 0;         /* 찌그러짐 방지 */
    word-break: keep-all;       /* 띄어쓰기 단위로 줄바꿈 */
}

.choice-item { 
    width: 90%; 
    height: 80px;           /* 높이를 고정하여 한 줄에 하나씩 딱 맞춤 */
    display: flex;          /* 텍스트 중앙 정렬을 위해 추가 */
    align-items: center; 
    justify-content: center;
    padding: 0 20px; 
    font-size: 2.2rem;      /* 너무 크면 잘릴 수 있으므로 살짝 조정 */
    font-weight: 900;
    border: 5px solid #ff9800; 
    border-radius: 20px; 
    background: #ffffff; 
    color: #e65100;
    box-sizing: border-box; /* 필수 */
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 0 #bf360c;
}
.choice-item:hover {
    background: #fff3e0;
    transform: translateY(-5px);
    box-shadow: 0 12px 0 #bf360c, 0 15px 25px rgba(0,0,0,0.15);
}

/* 정답일 때의 스타일 */
.choice-item.is-correct {
    background: linear-gradient(135deg, #4caf50, #2e7d32) !important; 
    border-color: #1b5e20 !important;
    color: #ffffff !important; /* 글자색을 흰색으로 하여 가독성 증대 */
    box-shadow: 0 8px 0 #1b5e20, 0 10px 20px rgba(0,0,0,0.2) !important;
    transform: scale(1.03);
}
        .answer-box { 
            position: absolute; bottom: 3vh; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px;
            font-size: 3.8rem; color: #b71c1c; font-weight: 900; padding: 2.5vh; background: #ffebee; 
            border-radius: 25px; display: none; border: 5px dashed #d32f2f; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            box-sizing: border-box; z-index: 10; animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            0% { transform: translate(-50%, 20px) scale(0.9); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    
    <div id="intro-view" class="intro-content">
        <img src="1.png" alt="도전 골든벨" class="main-img">
        
        <button class="btn-start-next" onclick="startQuiz()">시작</button>
    </div>

    <div id="quiz-view" style="display: none; flex-direction: column; justify-content: space-between; height: 100%; width: 100%;">
        <div class="header-box">
            <div class="quiz-type" id="quiz-type">로딩중</div>
            <div class="top-nav">
                <button class="btn-mini" onclick="prevQuestion()" style="background: linear-gradient(135deg, #ff9800, #f57c00);" title="이전 문제">◀</button>
                <button class="btn-mini btn-answer" onclick="showAnswer()" title="정답 확인">🔔</button>
                <button class="btn-mini btn-next" onclick="nextQuestion()" title="다음 문제">▶</button>
            </div>
        </div>
        
        <div class="question" id="question-text">문제를 불러오는 중입니다...</div>
        <div class="choices" id="choices-area"></div>
        <div class="answer-box" id="answer-text">정답: </div>
    </div>

    <div id="result-view" style="display: none; flex-direction: column; justify-content: center; align-items: center; height: 100%; width: 100%; gap: 3vh;">
        <div style="font-size: 6rem;">🔔🏆</div>
        <div style="font-size: 3.5rem; font-weight: 900; color: #e65100; word-break: keep-all;">축하합니다! 모든 문제를 다 풀었습니다.</div>
        <div style="font-size: 2.5rem; font-weight: 800; color: #1a2a6c;">명예의 전당에 등극했습니다!</div>
        <button class="btn-start-next" onclick="location.reload()" style="position: static; margin-top: 2vh; font-size: 1.6rem; padding: 15px 35px;">처음으로 돌아가기</button>
    </div>
</div>

<script>
    // '안녕 삐삐' 독서 골든벨 문제 리스트 (PDF 기반 탑재)
const soundDing = new Audio('ding.mp4');     // 띵동 효과음
const soundsp = new Audio('sp.mp4');
    const quizData = [
        { type: "객관식", q: "삐삐는 토미와 새 친구가 된 기념으로 분홍빛 조개껍데기로 장식된, 뚜껑이 달린 작은 상자를 주었다.", choices: ["① O", "② X",], a: "② X" },
        { type: "객관식", q: "삐삐는 요즘 나오는 그릇들이 얼마나 튼튼한지 궁금해서 찻잔을 풀밭에 던졌다.", choices: ["① O", "② X",], a: "② O" },
        { type: "객관식", q: "아니카는 그루터기에서 무엇을 발견했나요?", choices: ["① 반짝이는 은동전", "② 빨간 산호 목걸이", "③ 오래된 나침반", "④ 비밀 편지"], a: "② 빨간 산호 목걸이" },
        { type: "객관식", q: "불이 난 곳은 어느 건물이었나요?", choices: ["① 단층 주택", "② 고층 건물(아파트)", "③ 학교 강당", "④ 동물원 서커스장"], a: "② 고층 건물" },
        { type: "객관식", q: "비밀 장소로 정한 나무는 무슨 나무였을까요?", choices: ["① 은행나무", "② 버드나무", "③ 떡갈나무", "④ 사과나무"], a: "③ 떡갈나무" },
        { type: "객관식", q: "할머니에게 서커스 표를 구할 때 삐삐는 돈 대신 무엇을 주었나요?", choices: ["① 금덩이", "② 은화", "③ 다이아몬드", "④ 보물지도"], a: "① 금덩이" },
        { type: "객관식", q: "삐삐는 커서 무엇이 될 거라고 말했나요?", choices: ["① 서커스 단장", "② 학교 선생님", "③ 해적", "④ 경찰관"], a: "③ 해적" },
        { type: "객관식", q: "삐삐가 귀병에 좋다면서 귀에 부은 것은 무엇인가요?", choices: ["① 따뜻한 물", "② 우유", "③ 과일주스", "④ 기름"], a: "② 우유" },
        { type: "객관식", q: "고층 건물에 불이 났을 때 다락방에 갇혀 있던 아이들은 모두 몇 명이었나요?", choices: ["① 1명", "② 2명", "③ 3명", "④ 4명"], a: "② 2명" },
        { type: "객관식", q: "토미와 아니카가 학교에 안 가도 되는 이유는 무엇이었나요?", choices: ["① 대청소", "② 선생님 출장", "③ 개교기념일", "④ 소풍"], a: "① 대청소" },
        { type: "객관식", q: "삐삐가 한밤중에 집에 들어온 도둑들과 함께 신나게 춘 춤의 이름은 무엇인가요?", choices: ["① 발레", "② 왈츠", "③ 힙합", "④ 폴카"], a: "④ 폴카" },
        { type: "객관식", q: "서커스단에서 말을 타던 유명한 할머니는 어느 나라에서 오셨나요?", choices: ["① 스웨덴", "② 덴마크", "③ 노르웨이", "④ 프랑스"], a: "① 스웨덴" },
        { type: "객관식", q: "삐삐가 심술궂은 아이를 장난감 수레에 처박아 버린 이유는 무엇일까요?", choices: ["① 자기 수레를 훔쳐서", "② 숙녀(아니카)에게 예의가 없어서", "③ 짜증나서", "④ 닐슨 씨를 괴롭혀서"], a: "② 숙녀에게 예의가 없어서" },
        { type: "객관식", q: "브라질 사람들이 탈모 예방을 위해 머리에 바르고 다니는 것은 무엇일까요?", choices: ["① 마요네즈", "② 간장", "③ 달걀", "④ 샴푸"], a: "③ 달걀" },
        { type: "객관식", q: "삐삐가 과테말라 사람들은 잘 때 어떻게 잔다고 했나요?", choices: ["① 거꾸로 매달려 잔다", "② 발가락을 꼼지락거리며 잔다", "③ 눈을 뜨고 잔다", "④ 노래를 부르며 잔다"], a: "② 발가락을 꼼지락거리며 잔다" },
        { type: "객관식", q: "아돌프와의 씨름 대결에서 이기면 서커스 단장이 주겠다고 한 상금은 얼마였을까요?", choices: ["① 10크로나", "② 50크로나", "③ 100크로나", "④ 500크로나"], a: "③ 100크로나" },
        { type: "주관식", q: "삐삐의 엄마는 천사이고 아빠는 바다 저편의 무엇인가요?", a: "식인종 (또는 식인종 왕)" },
        { type: "주관식", q: "주근깨 소녀인 삐삐가 혼자 살고 있는 집의 이름은 무엇인가요?", a: "뒤죽박죽 별장" },
        { type: "주관식", q: "토미와 아니카가 뒤죽박죽 별장에 처음 놀러 갔을 때 삐삐가 대접한 음식은 무엇인가요?", a: "팬케이크" },
        { type: "주관식", q: "토미와 아니카를 위해 삐삐는 부엌 바닥에서 만든 과자는 무슨 모양이었나요?", a: "하트 모양" },
        { type: "주관식", q: "정원에서 '발견놀이'를 하던 삐삐가 가장 첫 번째로 찾아낸 물건은 무엇인가요?", a: "양철통" },
        { type: "주관식", q: "삐삐를 어린이집에 보내려고 지붕 위까지 쫓아왔던 경찰관들은 무엇이 없어서 내려가지 못했나요?", a: "사다리" },
        { type: "주관식", q: "엄마들이 모인 다과회에 가느라 토미와 아니카가 놀지 못할 때 삐삐가 원숭이 닐슨 씨에게 챙겨준 음식 두 가지는 무엇인가요?", a: "과일주스와 롤빵" },
        { type: "주관식", q: "아니카와 토미가 삐삐의 생일 선물로 준비해 온 것은 무엇인가요?", a: "음악상자" },
        { type: "주관식", q: "소방대 대원과 광장에 모인 사람들이 삐삐에게 만세삼창을 외친 까닭은 무엇인가요?", a: "아이들을 구해 주었기 때문 " },
        { type: "주관식", q: "삐삐와 뒤죽박죽 별장에서 함께 살고 있는 동물 두 가지는 무엇인가요?", a: "원숭이, 말 (순서 상관없음)" },
        { type: "주관식", q: "그림 그리기 시간에 선생님이 삐삐에게 소리를 지른 이유는 무엇인가요?", a: "도화지가 아닌 바닥에 그림을 그렸기 때문 " },
        { type: "주관식", q: "삐삐는 몇살일까요?", a: "9살" },
        { type: "주관식", q: "삐삐가 큰 구두를 신는 까닭은 무엇일까요?", a: "발가락을 꼼지락거릴 수 있기 때문에" },
        { type: "주관식", q: "생일 파티에 갈 때 아니카의 엄마가 가장 좋은 옷을 입지 못하게 말린 이유는 무엇인가요?", a: "삐삐 집에 갔다가 옷을 더럽히지 않고 돌아온 적이 없어서 " }
    ];
// 여기에 이 함수를 새로 추가합니다.
    function shuffleQuestions(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    let currentIndex = 0;

    // 화면 전환 함수
    function startQuiz() {
shuffleQuestions(quizData); // 시작할 때 문제를 섞어주는 코드를 추가합니다.
        
        document.getElementById("intro-view").style.display = "none";
        document.getElementById("quiz-view").style.display = "flex";
        loadQuiz();
    }

    function loadQuiz() {
        soundDing.currentTime = 0; // 초기화
    soundDing.play().catch(e => console.log("오디오 재생 실패:", e));
        if (quizData.length === 0) return;
        const currentQuiz = quizData[currentIndex];
        
        document.getElementById("quiz-type").innerText = `🏆 문제 ${currentIndex + 1} / ${quizData.length} (${currentQuiz.type})`;
        document.getElementById("question-text").innerText = currentQuiz.q;
        
        document.getElementById("answer-text").style.display = "none";
        document.getElementById("answer-text").innerText = "정답: " + currentQuiz.a;

        const choicesArea = document.getElementById("choices-area");
        
        if(currentQuiz.type === "객관식") {
            choicesArea.style.display = "flex";
            choicesArea.innerHTML = "";
            
            currentQuiz.choices.forEach(choice => {
                choicesArea.innerHTML += `<div class="choice-item" data-text="${choice.trim()}">${choice.trim()}</div>`;
            });
        } else {
            choicesArea.style.display = "none";
        }
    }

function showAnswer() {
    soundsp.currentTime = 0;
    soundsp.play();
        const currentQuiz = quizData[currentIndex];
        
        if(currentQuiz.type === "객관식") {
            const correctAnswerText = currentQuiz.a.replace(/^[①②③④]\s*/, "").trim(); 
            const choiceItems = document.querySelectorAll(".choice-item");
            
            choiceItems.forEach(item => {
                const itemText = item.getAttribute("data-text");
                if(itemText && itemText.includes(correctAnswerText)) {
                    item.classList.add("is-correct");
                }
            });
        } else {
            document.getElementById("answer-text").style.display = "block";
        }
    }

// 이전 문제로 이동하는 함수
    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            loadQuiz();
        } else {
            alert("첫 번째 문제입니다!");
        }
    }
// 스케일 조절 함수 추가
function resizeGame() {
    const container = document.getElementById('quiz-container');
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    
    // 1200x800 비율을 기준으로 배율 계산
    const scale = Math.min((winW / 1200) * 0.95, (winH / 800) * 0.95);
    
    // 컨테이너에 스케일 적용
    container.style.transform = `scale(${scale})`;
}

// 1. 창 크기가 바뀔 때마다 실행
window.addEventListener('resize', resizeGame);

// 2. 페이지 로드 직후 한 번 실행
window.onload = resizeGame;
    // 다음 문제로 이동하는 함수 (마지막 문제 풀이 후 화면 전환 반영)
    function nextQuestion() {
        if (currentIndex < quizData.length - 1) {
            currentIndex++;
            loadQuiz();
        } else {
            // 알림창 대신 퀴즈 화면을 숨기고 결과 화면을 띄웁니다.
            document.getElementById("quiz-view").style.display = "none";
            document.getElementById("result-view").style.display = "flex";
        }
    }
</script>
